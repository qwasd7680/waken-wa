# Quick start: ./deploy.sh
# Local stack: single app service + SQLite (volume waken_sqlite_data). No Postgres.
# JWT: optional in .env; if empty, entrypoint creates /app/data/.jwt_secret on first run.

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: file:/app/data/dev.db
      JWT_SECRET: ${JWT_SECRET:-}
      NODE_ENV: production
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      HCAPTCHA_SITE_KEY: ${HCAPTCHA_SITE_KEY:-}
      HCAPTCHA_SECRET_KEY: ${HCAPTCHA_SECRET_KEY:-}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
    volumes:
      - waken_sqlite_data:/app/data

volumes:
  waken_sqlite_data:
